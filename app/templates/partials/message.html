<article class="message-card{% if message.sender_id == current_user.id %} message-card-own{% endif %}">
    <div class="message-head">
        <strong>{{ message.sender.full_name }}</strong>
        <span>{{ message.created_at.strftime("%Y-%m-%d %H:%M") }}</span>
    </div>
    {% if message.content %}
    <p>{{ message.content }}</p>
    {% endif %}
    {% for attachment in message.attachments %}
    <a class="attachment-link" href="/uploads/{{ attachment.stored_name }}" target="_blank" rel="noopener">{{ attachment.original_name }}</a>
    {% endfor %}
</article>
